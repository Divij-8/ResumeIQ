spring.application.name=ResumeIQ

# H2 In-Memory Database (works out of the box, no setup needed)
spring.datasource.url=jdbc:h2:mem:resumeiq_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# To use MySQL instead, comment out H2 above and uncomment below:
# spring.datasource.url=jdbc:mysql://localhost:3306/resumeiq_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=YOUR_MYSQL_PASSWORD
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration (PDF support)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

